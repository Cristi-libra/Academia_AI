<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gem — AI Teaching Assistant</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="username-overlay">
  <div id="username-box">
    <div class="avatar avatar-lg">🎓</div>
    <h1>Gem</h1>
    <p>Profesor de Computer Science &amp; Python. Introdu un nume ca să începi.</p>
    <input id="username-input" type="text" placeholder="Numele tău" autocomplete="off">
    <button id="username-submit">Start chatting</button>
  </div>
</div>

<header id="app-header">
  <div class="avatar avatar-sm">🎓</div>
  <div id="header-text">
    <span id="app-title">Gem</span>
    <span id="app-subtitle">Professor · Computer Science &amp; Python</span>
  </div>
  <span id="current-user"></span>
  <button id="change-user-btn" title="Schimbă utilizatorul" type="button">Schimbă userul</button>
</header>

<main id="chat-window"></main>

<footer id="composer">
  <button id="attach-btn" title="Atașează fișier" type="button">📎</button>
  <input id="file-input" type="file" hidden>
  <textarea id="message-input" placeholder="Scrie un mesaj..." rows="1"></textarea>
  <button id="send-btn" title="Trimite" type="button">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M3 12l18-9-6 9 6 9-18-9zm3.5 0l9.5 4.75L11.5 12 16 7.25 6.5 12z"/></svg>
  </button>
</footer>

<script src="app.js" defer></script>
</body>
</html>
